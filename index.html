<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>予約カレンダー</title>

  <!-- Bulma -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.5/css/bulma.min.css">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f5f5;
    }

    #calendar {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
    }

    #loading {
      display: none;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .fc-toolbar-title {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

<section class="section">
  <div class="container">

    <h1 class="title has-text-centered">予約カレンダー</h1>

    <div id="loading" class="notification is-info is-light has-text-centered">
      読み込み中...
    </div>

    <div id="calendar"></div>

  </div>
</section>

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<!-- アプリ -->
<script src="app.js"></script>

</body>
</html>
