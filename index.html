<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>予約カレンダー</title>

  <link rel="stylesheet" href="bulma.min.css">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

  <style>
    body { background: #f5f5f5; }

    #calendar {
      background: #fff;
      padding: 12px;
      border-radius: 6px;
    }

    #loading { display:none; margin-bottom:10px; }

    .modal { z-index: 9999; }

    .modal-card {
      max-width: 95vw;
      width: min(95vw, 900px);
      max-height: 90vh;
      height: auto;
    }

    .modal-card-body .field-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .modal-card-body .field-row .field {
      flex: 1 1 180px;
      min-width: 180px;
    }

    @media (max-width:768px){
      .fc-toolbar-title { font-size:1rem; }
      .modal-card .select select,
      .modal-card .input,
      .modal-card .textarea {
        font-size: 16px;
      }
      .modal-card-body .field-row .field {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>

<section class="section">
  <div class="container">

    <h1 class="title has-text-centered">予約カレンダー</h1>

    <div id="loading" class="notification is-info is-light has-text-centered">
      読み込み中...
    </div>

    <div id="calendar"></div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="app.js"></script>

</body>
</html>
